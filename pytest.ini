[pytest]
# `main.py`/`incident_store.py`/`auth.py` live at the repo root, and tests
# import them directly (e.g. `import main`) - rootdir-relative imports
# only work cleanly if pytest is run from the project root, which this
# file's presence there also signals to pytest/IDEs.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# main.py/incident_store.py use `async def` endpoints and awaited I/O,
# but the test suite itself only needs sync TestClient calls - no
# pytest-asyncio markers are actually used yet. Left as "auto" so async
# test functions (if added later, e.g. testing embed_text() directly)
# work without needing an explicit @pytest.mark.asyncio on every one.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning