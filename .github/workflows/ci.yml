name: CI

# Runs on every push and PR against main - this is the gate that decides
# whether a change is safe to merge. Each job is independent so a lint
# failure surfaces immediately without waiting for the (slower) test job,
# and a person reviewing a failed run can see exactly which gate failed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.7.4
      - name: Run ruff
        run: ruff check main.py auth.py incident_store.py tests/

  security:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tools
        # Pinned to the exact versions this codebase was actually
        # verified against (including the `# nosec` annotations in
        # incident_store.py/auth.py/main.py, which assume bandit's
        # current B608/B104 rule behavior) - an unpinned `pip install`
        # here would drift silently as new tool versions release.
        run: pip install bandit==1.9.4 pip-audit==2.10.1
      - name: Bandit (static analysis for common Python security issues)
        run: bandit -r main.py auth.py incident_store.py -ll
      - name: pip-audit (known-CVE scan of pinned dependencies)
        run: pip-audit -r requirements.txt

  test:
    name: Test suite (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest -q
        env:
          # Test-only values - never real secrets. conftest.py also sets
          # these via os.environ.setdefault(), but setting them here too
          # keeps CI's behavior legible without having to open conftest.py
          # to know what env the suite needs.
          MOCK_MODE: "true"
          JWT_SECRET_KEY: "ci-test-secret-never-used-in-production-0123456789"
          APP_ENV: "test"

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    # Gated behind the other three - no point spending time on a container
    # build if the code inside it already failed lint/security/tests.
    needs: [lint, security, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t patchops:ci-${{ github.sha }} .
      - name: Smoke-test the built image
        # Boots the actual container (mock mode, no real Gemini key needed)
        # and hits /api/health through the port it exposes - catches
        # Dockerfile-level breakage (wrong COPY paths, missing files) that
        # a successful `docker build` alone wouldn't necessarily surface.
        run: |
          docker run -d --name patchops-smoke \
            -e MOCK_MODE=true \
            -e JWT_SECRET_KEY=ci-smoke-test-secret-0123456789 \
            -p 8000:8000 \
            patchops:ci-${{ github.sha }}
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/api/health; then
              echo "Health check passed."
              exit 0
            fi
            sleep 1
          done
          echo "Health check never succeeded - dumping container logs:"
          docker logs patchops-smoke
          exit 1